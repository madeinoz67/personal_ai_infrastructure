# Docker Compose configuration for PAI Knowledge System with Neo4j backend
# Alternative to FalkorDB - uses Neo4j for the graph database
#
# Services:
#   - neo4j: Graph database backend (Cypher queries, no RediSearch/Lucene escaping needed)
#   - graphiti-mcp: MCP server (exposed to host)
#
# Usage from pack directory:
#   1. Copy config/.env.example to config/.env and configure your API keys
#   2. Set PAI_KNOWLEDGE_DATABASE_TYPE=neo4j in your .env
#   3. Run: docker compose -f src/server/docker-compose-neo4j.yml up -d
#   4. MCP server uses SSE transport at: http://localhost:8000/sse
#   5. Access Neo4j Browser at: http://localhost:7474

networks:
  pai-knowledge-net:
    driver: bridge

volumes:
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local

services:
  # Neo4j Graph Database
  # Native graph database with Cypher query language
  neo4j:
    image: neo4j:5.26.0
    container_name: pai-knowledge-neo4j
    restart: unless-stopped
    networks:
      - pai-knowledge-net
    ports:
      - "7474:7474"  # Neo4j Browser HTTP
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-paiknowledge}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Graphiti MCP Server (Neo4j backend)
  # Uses zepai/knowledge-graph-mcp:standalone image for Neo4j support
  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:standalone
    container_name: pai-knowledge-graph-mcp
    restart: unless-stopped
    networks:
      - pai-knowledge-net
    ports:
      - "8000:8000"  # MCP HTTP endpoint
    environment:
      # LLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}

      # Neo4j Database Configuration
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-paiknowledge}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}

      # Application Configuration
      - GRAPHITI_GROUP_ID=${GROUP_ID:-main}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}
      - CONFIG_PATH=/app/mcp/config/config.yaml

      # Telemetry
      - GRAPHITI_TELEMETRY_ENABLED=${GRAPHITI_TELEMETRY_ENABLED:-false}

      # Model Configuration
      - MODEL_NAME=${MODEL_NAME:-gpt-4o-mini}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDER_PROVIDER=${EMBEDDER_PROVIDER:-openai}
    volumes:
      - ./config-neo4j.yaml:/app/mcp/config/config.yaml:ro
    env_file:
      - ${PAI_DIR:-${HOME}/.config/pai}/.env
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "-H", "Accept: text/event-stream", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["uv", "run", "main.py"]
